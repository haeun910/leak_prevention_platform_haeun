services:
  backend:
    build:
      context: ./backend
    container_name: leak-prevention-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////data/admin_logs.db
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: leak-prevention-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  backend-data:
